<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa - Wycieczka do Chin</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; }
    #map { height: 100vh; width: 100%; }
    .popup-title { font-size: 16px; font-weight: bold; margin-bottom: 4px; }
    .popup-desc { font-size: 13px; color: #555; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([32, 110], 5);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 18
    }).addTo(map);

    const places = [
      { name: "Guangzhou", lat: 23.128994, lng: 113.253250, desc: "Metropolia w delcie Rzeki Perłowej, stolica prowincji Guangdong" },
      { name: "Shenzhen", lat: 22.542883, lng: 114.062996, desc: "Technologiczna stolica Chin, tuż przy granicy z Hong Kongiem" },
      { name: "Hong Kong", lat: 22.285520, lng: 114.157692, desc: "Specjalny Region Administracyjny - wieżowce, port, dim sum" },
      { name: "Beijing", lat: 39.907500, lng: 116.397230, desc: "Stolica Chin - Zakazane Miasto, Wielki Mur, Plac Tiananmen" },
      { name: "Pingyao (Shanxi)", lat: 37.2037904, lng: 112.1771043, desc: "Starożytne miasto z zachowanymi murami, UNESCO" },
      { name: "Mount Hua (Hua Shan)", lat: 34.483333, lng: 110.086667, desc: "Jedna z pięciu świętych gór Chin, słynne szlaki na krawędziach klifów" },
      { name: "Xi'an", lat: 34.341575, lng: 108.939770, desc: "Armia Terakotowa, mury miejskie, Dzielnica Muzułmańska" },
      { name: "Longmen Grottoes", lat: 34.4667, lng: 112.4667, desc: "Groty z tysiącami rzeźb buddyjskich, UNESCO" },
      { name: "Leshan", lat: 29.552526, lng: 103.761263, desc: "Wielki Budda z Leshan - największy kamienny posąg Buddy na świecie" },
      { name: "Chengdu", lat: 30.666670, lng: 104.066670, desc: "Stolica Syczuanu - pandy, pikantna kuchnia, herbaciarnie" }
    ];

    const redIcon = L.divIcon({
      html: '<div style="background:#e74c3c;width:12px;height:12px;border-radius:50%;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.4)"></div>',
      iconSize: [16, 16],
      iconAnchor: [8, 8],
      className: ''
    });

    const group = [];
    places.forEach((p, i) => {
      const marker = L.marker([p.lat, p.lng], { icon: redIcon }).addTo(map);
      marker.bindPopup(`<div class="popup-title">${i+1}. ${p.name}</div><div class="popup-desc">${p.desc}</div>`);
      group.push(marker);
    });

    // Draw route line
    const route = places.map(p => [p.lat, p.lng]);
    L.polyline(route, { color: '#e74c3c', weight: 2, opacity: 0.5, dashArray: '8,8' }).addTo(map);

    // Fit bounds
    const bounds = L.latLngBounds(places.map(p => [p.lat, p.lng]));
    map.fitBounds(bounds.pad(0.1));
  </script>
</body>
</html>
